name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref so we never burn CI minutes on stale
# pushes during a fast-iterating session.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `requires-python = ">=3.9"` in pyproject.toml — test the floor
        # and a current version so we catch breakage in either direction
        # without burning a minute on every interim release.
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # astral-sh/setup-uv only ships full version tags (no bare
        # major-version `v8` ref), so pin the latest exact release.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff check src/ tests/

      - name: Test (pytest)
        run: uv run --python ${{ matrix.python-version }} pytest -q

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  ts:
    # Phase 0 of the TypeScript rewrite (see docs/REWRITE_PLAN.md).
    # The Python build above stays the canonical install during the
    # port; this job runs the TS scaffold so each phase commit can be
    # gated on green CI before merging.
    name: ts (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check (Biome)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test

      - name: Build bundle (tsup)
        run: pnpm build
